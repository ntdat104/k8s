# ============================================================
# FRONTEND SERVICE
# - type NodePort: expose ra NGOAI cluster de user truy cap bang trinh duyet
#   (tren cloud that su nen dung LoadBalancer hoac Ingress)
# - minikube: lay URL bang `minikube service frontend-service -n guestbook --url`
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: guestbook
  labels:
    app.kubernetes.io/name: guestbook
    app.kubernetes.io/component: frontend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: guestbook
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
