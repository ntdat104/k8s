# ============================================================
# BACKEND SERVICE
# - type ClusterIP: chi goi duoc TU TRONG cluster (frontend goi)
# - Ten "backend-service" chinh la DNS noi bo:
#     backend-service.guestbook.svc.cluster.local:8080
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: guestbook
  labels:
    app.kubernetes.io/name: guestbook
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    # Service route traffic toi cac pod co dung label nay
    app.kubernetes.io/name: guestbook
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
