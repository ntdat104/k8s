# ============================================================
# HorizontalPodAutoscaler cho backend (TUY CHON)
# - Tu dong scale 3 -> 10 pod khi CPU > 70%
# - Yeu cau metrics-server. Tren minikube bat bang:
#     minikube addons enable metrics-server
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: guestbook
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
