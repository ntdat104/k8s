# ============================================================
# Nginx config cho frontend pod
# - Serve React SPA (try_files -> index.html cho client routing)
# - Proxy /api/ sang backend qua DNS NOI BO cua K8s
#     http://backend-service:8080
#   Day la noi DNS noi bo thuc su duoc dung (server-side,
#   ben trong cluster) - trinh duyet khong can biet ten nay.
# ============================================================

# DNS resolver cua K8s (cho phep phan giai backend-service dong)
resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    # Health check cho chinh frontend (K8s probe)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy API sang backend-service noi bo
    location /api/ {
        # Dung bien de nginx phan giai DNS luc runtime (chiu duoc backend doi IP)
        set $backend "http://backend-service.guestbook.svc.cluster.local:8080";
        # Bo tien to /api roi forward phan con lai (vd /api/messages -> /messages)
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # SPA: moi route khac tra ve index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
